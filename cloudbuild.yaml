steps:
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'github-package-registry-mirror'
      - '--source'
      - '.'
      - '--region'
      - 'europe-north1'
      - '--allow-unauthenticated'
      - '--cpu'
      - '1'
      - '--memory'
      - '256Mi'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '900'
      - '--max-instances'
      - '1000'
