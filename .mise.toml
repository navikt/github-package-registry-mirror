[tools]
go = "1.24"
golangci-lint = "latest"
gradle = "8.14.4"
java = "temurin-21"

[tasks.test]
description = "Run unit tests"
run = "go test -race ./..."

[tasks.check]
description = "Run all linters and static analysis"
run = "gofumpt -l . && golangci-lint run && staticcheck ./... && govulncheck ./..."

[tasks.run]
description = "Run the server locally"
run = "go run ."

[tasks."test:integration"]
description = "Run integration test (resolves a real Maven package through the mirror)"
run = """
if [ -z "${GITHUB_TOKEN:-}" ]; then
    printf 'GITHUB_TOKEN not set. Enter a GitHub PAT with read:packages scope: '
    read -r GITHUB_TOKEN
    export GITHUB_TOKEN
fi
bash test/integration/run.sh
"""
